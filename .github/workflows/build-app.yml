name: Build Single App Image

on:
  workflow_dispatch:
    inputs:
      app:
        description: "Which app to build"
        required: true
        type: choice
        default: dev
        options:
          - base
          - base-debian
          - base-alpine
          - dev
          - me

concurrency:
  group: build-app-images
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/reusable-build-image.yml
    with:
      app: ${{ inputs.app }}
    secrets: inherit
