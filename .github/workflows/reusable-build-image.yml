name: Reusable build and push image

on:
  workflow_call:
    inputs:
      app:
        description: Which app to build
        required: true
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          use: true
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        if: ${{ env.ACR_REGISTRY && env.ACR_USERNAME && env.ACR_PASSWORD }}
        env:
          ACR_REGISTRY: ${{ secrets.ALI_ACR_REGISTRY }}
          ACR_USERNAME: ${{ secrets.ALI_ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ALI_ACR_PASSWORD }}
        with:
          registry: ${{ secrets.ALI_ACR_REGISTRY }}
          username: ${{ secrets.ALI_ACR_USERNAME }}
          password: ${{ secrets.ALI_ACR_PASSWORD }}

      - name: Resolve image metadata
        id: prepare
        uses: actions/github-script@v7
        with:
          script: |
            const app = '${{ inputs.app }}';

            const tagMap = {
              base: 'base,ubuntu',
              'base-debian': 'debian',
              'base-alpine': 'alpine',
              me: 'me,aliuq'
            };

            core.setOutput('tags', tagMap[app] || app);

      - name: Build & Push
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/aliuq/devcontainer
          imageTag: ${{ steps.prepare.outputs.tags }}
          platform: linux/amd64,linux/arm64
          subFolder: src/${{ inputs.app }}
          noCache: true
          push: always

      - name: Sync to another registry (docker.io, aliyun ACR)
        uses: actions/github-script@v7
        env:
          INPUT_TAGS: ${{ steps.prepare.outputs.tags }}
          ACR_REGISTRY: ${{ secrets.ALI_ACR_REGISTRY }}
          ACR_USERNAME: ${{ secrets.ALI_ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ALI_ACR_PASSWORD }}
        with:
          script: |
            const tags = (process.env.INPUT_TAGS || '')
              .split(',')
              .map((tag) => tag.trim())
              .filter(Boolean);

            for (const tag of tags) {
              console.log(`\n(${tag}) Pushing to Docker Hub (docker.io/aliuq/devcontainer:${tag}) ...`);

              await exec.exec('/usr/bin/skopeo', [
                'copy',
                '--all',
                `oci-archive:/tmp/output.tar:${tag}`,
                `docker://docker.io/aliuq/devcontainer:${tag}`
              ]);
            }

            if (process.env.ACR_REGISTRY && process.env.ACR_USERNAME && process.env.ACR_PASSWORD) {
              for (const tag of tags) {
                console.log(`\n(${tag}) Pushing to Aliyun ACR (${process.env.ACR_REGISTRY}/aliuq/devcontainer:${tag}) ...`);

                await exec.exec('/usr/bin/skopeo', [
                  'copy',
                  '--all',
                  `oci-archive:/tmp/output.tar:${tag}`,
                  `docker://${process.env.ACR_REGISTRY}/aliuq/devcontainer:${tag}`
                ]);
              }
            }
